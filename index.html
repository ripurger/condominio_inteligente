<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Condomínio Inteligente</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <h1>Condomínio Inteligente</h1>
      <p>Entre com sua conta para continuar</p>

      <div id="alert" class="alert alert-error" style="display:none"></div>

      <div class="field">
        <label>E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com">
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="senha" placeholder="••••••••">
      </div>
      <button class="btn btn-primary" id="btn-login">Entrar</button>
    </div>
  </div>

  <script type="module">
    import { login } from './js/auth.js'

    document.getElementById('btn-login').addEventListener('click', async () => {
      const email = document.getElementById('email').value
      const senha = document.getElementById('senha').value
      const alert = document.getElementById('alert')
      const btn = document.getElementById('btn-login')

      btn.disabled = true
      btn.textContent = 'Entrando...'
      alert.style.display = 'none'

      try {
        await login(email, senha)
      } catch (e) {
        alert.textContent = 'E-mail ou senha inválidos.'
        alert.style.display = 'block'
        btn.disabled = false
        btn.textContent = 'Entrar'
      }
    })
  </script>
</body>
</html>
